<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Manajemen Akun KDMP - Verifikasi Wajib untuk Lihat Daftar & Buat Superadmin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(115deg, #5b9cff 0%, #8fb4ff 30%, #cfe8ff 65%, #ffe0d5 100%);
            min-height: 100vh;
            padding: 32px 20px;
            color: #1a2c3e;
        }

        .dark body {
            background: linear-gradient(115deg, #0f2b3f 0%, #1a3a55 40%, #2a4f6e 70%, #4a3b4a 100%);
            color: #f0f6ff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero-card {
            background: linear-gradient(115deg, #c2e0ff 0%, #ffe0d0 70%, #fff0e5 100%);
            border-radius: 40px;
            padding: 28px 32px;
            margin-bottom: 32px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.7);
            text-align: center;
        }
        .dark .hero-card {
            background: linear-gradient(115deg, #1f4e6e 0%, #3a2e3a 60%, #2f5570 100%);
            border-color: #608aad;
            color: #f0f3f8;
        }

        .hero-card h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .hero-card h1 .kdmp-red {
            color: #d92d20;
            display: inline-block;
        }
        .dark .hero-card h1 .kdmp-red {
            color: #ff8a7a;
        }

        .badge-role {
            background: #e8f0fe;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .dark .badge-role {
            background: #1e3a5f;
            color: #7bc3ff;
            border: 1px solid #3a7ca5;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 28px 32px;
            margin-bottom: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.06);
            border: 1px solid rgba(70, 130, 200, 0.35);
        }
        .dark .glass-card {
            background: rgba(20, 40, 60, 0.88);
            border-color: #3c6e9e;
            color: #f0f3f8;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 28px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .field label {
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            color: #1f6390;
            text-transform: uppercase;
        }
        .dark .field label {
            color: #7ab3cf;
        }
        input, select {
            background: white;
            border: 1.5px solid #c3e0ff;
            border-radius: 28px;
            padding: 12px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.2s;
            outline: none;
            color: #1f2f3f;
        }
        .dark input, .dark select {
            background: #1f3345;
            border-color: #3a7ca5;
            color: #f1f5f9;
        }
        input:focus, select:focus {
            border-color: #2a7faa;
            box-shadow: 0 0 0 3px rgba(42, 127, 170, 0.25);
        }

        .btn {
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .btn-primary {
            background: linear-gradient(95deg, #3b82f6, #f47b3a);
            color: white;
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.02);
        }
        .btn-secondary {
            background: linear-gradient(95deg, #c5e0ff, #ffe1cd);
            color: #1f6390;
            border: 1px solid #9ac2e5;
        }
        .dark .btn-secondary {
            background: linear-gradient(95deg, #2d4a6e, #5a3a4a);
            color: #bddbff;
            border-color: #5a8bb3;
        }
        .btn-danger {
            background: linear-gradient(95deg, #ffb8a3, #ff9e7a);
            color: #a1220f;
        }
        .dark .btn-danger {
            background: linear-gradient(95deg, #b55a4a, #8f3e30);
            color: #ffe0d6;
        }
        .btn-sm {
            padding: 8px 18px;
            font-size: 0.75rem;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 8px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 28px;
            background: rgba(235, 248, 255, 0.6);
            backdrop-filter: blur(4px);
            margin-top: 20px;
        }
        .dark .table-wrapper {
            background: rgba(0,0,0,0.25);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #cbe5fe;
            padding: 16px 12px;
            font-weight: 700;
            font-size: 0.8rem;
            text-align: left;
            color: #155f8a;
        }
        .dark th {
            background: #2a577b;
            color: #fbddb5;
        }
        td {
            padding: 14px 12px;
            border-bottom: 1px solid #cfe2f5;
            color: #2c3e4e;
        }
        .dark td {
            border-color: #3f6a8c;
            color: #f0f3f8;
        }
        .badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .badge-superadmin { background: #ffb347; color: #462100; }
        .badge-admin { background: #69c0ff; color: #003366; }
        .badge-pengguna { background: #b0e0c9; color: #226644; }
        .dark .badge-superadmin { background: #fd9e3a; color: #1f1a0c; }
        .dark .badge-admin { background: #3b82f6; color: #eef4ff; }
        .dark .badge-pengguna { background: #2e8b57; color: #e0f2e9; }

        .status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 50px;
            text-align: center;
            font-weight: 500;
            background: rgba(255,255,240,0.8);
            color: #1f6390;
        }
        .dark .status-message {
            background: rgba(30,30,50,0.8);
            color: #8bcbff;
        }

        .theme-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: linear-gradient(145deg, #3b82f6, #f57c5a);
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 60px;
            font-size: 1.6rem;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            color: white;
            transition: 0.2s;
            z-index: 99;
        }

        .security-badge {
            background: #ffecb3;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #b45f06;
            margin-top: 12px;
        }
        .dark .security-badge {
            background: #2e3b2c;
            color: #ffd966;
        }

        @media (max-width: 680px) {
            .glass-card, .hero-card {
                padding: 20px;
            }
            .btn {
                padding: 8px 18px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero-card">
        <h1>Manajemen Akun Aplikasi <span class="kdmp-red">KDMP</span> Kab. Bima</h1>
        <div style="display: flex; justify-content: center; gap: 12px; margin-top: 12px; flex-wrap: wrap;">
            <span class="badge-role"><i class="fas fa-user"></i> Pengguna</span>
            <span class="badge-role"><i class="fas fa-user-shield"></i> Admin</span>
            <span class="badge-role"><i class="fas fa-crown"></i> Superadmin</span>
        </div>
    </div>

    <!-- Form Tambah/Edit Akun -->
    <div class="glass-card">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
            <i class="fas fa-user-plus" style="font-size: 28px; color: #2a7faa;"></i>
            <h2 style="font-weight: 700; font-size: 1.6rem;" id="formTitle">Tambah Akun Baru</h2>
        </div>
        <div class="form-grid">
            <div class="field">
                <label><i class="fas fa-user-tag"></i> Nama Pengguna</label>
                <input type="text" id="namaPengguna" placeholder="Misal: Bima">
            </div>
            <div class="field">
                <label><i class="fas fa-envelope"></i> Email (Username Login)</label>
                <input type="email" id="email" placeholder="Bima@kdmp.com">
            </div>
            <div class="field">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Minimal 6 karakter">
            </div>
            <div class="field">
                <label><i class="fas fa-shield-alt"></i> Level Akses</label>
                <select id="level">
                    <option value="pengguna" selected>📖 Pengguna (baca saja)</option>
                    <option value="admin">🛠️ Admin (CRUD, tanpa log)</option>
                    <option value="superadmin">👑 Superadmin (Akses penuh + log)</option>
                </select>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" id="simpanBtn"><i class="fas fa-save"></i> Simpan Akun</button>
            <button class="btn btn-secondary" id="resetBtn"><i class="fas fa-undo-alt"></i> Reset Form</button>
            <button class="btn btn-secondary" id="toggleDaftarBtn"><i class="fas fa-list-ul"></i> Tampilkan Daftar Akun</button>
        </div>
        <div id="statusMessage" class="status-message" style="display: none;"></div>
    </div>

    <!-- Daftar Akun -->
    <div id="daftarContainer" style="display: none;">
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
                <h2 style="font-weight: 700;"><i class="fas fa-database"></i> Seluruh Akun Terdaftar</h2>
                <button class="btn btn-secondary btn-sm" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
            <div class="table-wrapper" id="tableAkun">
                <div style="padding: 40px; text-align: center;">Memuat data akun...</div>
            </div>
        </div>
    </div>
</div>
<button class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i></button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, deleteDoc, collection, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCOmBD0GIxPkMRDmC1hYhW614K-zZQM_so",
        authDomain: "kdmpbima.firebaseapp.com",
        projectId: "kdmpbima",
        storageBucket: "kdmpbima.firebasestorage.app",
        messagingSenderId: "494873142775",
        appId: "1:494873142775:web:a3201c156696e31dd7baf2",
        measurementId: "G-EP8NNL6KN6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM elements
    const namaPenggunaInput = document.getElementById("namaPengguna");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const levelSelect = document.getElementById("level");
    const statusDiv = document.getElementById("statusMessage");
    const formTitle = document.getElementById("formTitle");
    const simpanBtn = document.getElementById("simpanBtn");
    const resetBtn = document.getElementById("resetBtn");
    const toggleDaftarBtn = document.getElementById("toggleDaftarBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const daftarContainer = document.getElementById("daftarContainer");
    const tableAkunDiv = document.getElementById("tableAkun");

    let modeEdit = false;
    let editUid = null;
    let daftarVisible = false;

    function tampilkanStatus(pesan, isError = false, isSuccess = false) {
        statusDiv.style.display = "block";
        statusDiv.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : isSuccess ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${pesan}`;
        statusDiv.style.backgroundColor = isError ? "rgba(255,180,160,0.2)" : isSuccess ? "rgba(80,200,120,0.2)" : "rgba(42,127,170,0.15)";
        statusDiv.style.color = isError ? "#c0392b" : isSuccess ? "#2c6e2f" : "#267cac";
        setTimeout(() => {
            if (statusDiv) statusDiv.style.display = "none";
        }, 4000);
    }

    function sweetInfo(icon, title, text) {
        Swal.fire({ icon, title, text, confirmButtonColor: "#3b82f6", timer: 2000, showConfirmButton: false });
    }

    function resetForm() {
        namaPenggunaInput.value = "";
        emailInput.value = "";
        passwordInput.value = "";
        levelSelect.value = "pengguna";
        modeEdit = false;
        editUid = null;
        formTitle.innerText = "Tambah Akun Baru";
        tampilkanStatus("Form bersih, siap menambah akun baru", false);
    }

    // === FUNGSI KEAMANAN: VERIFIKASI PASSWORD AKUN ===
    async function verifySuperadminPassword(inputPassword) {
        try {
            const userCred = await signInWithEmailAndPassword(auth, "ianz@kdmp.com", inputPassword);
            await signOut(auth);
            return true;
        } catch (error) {
            console.error("Verifikasi Gagal:", error.code);
            if (error.code === 'auth/user-not-found') {
                throw new Error("Akun verifikasi tidak ditemukan.");
            } else if (error.code === 'auth/wrong-password') {
                throw new Error("Password salah! Akses ditolak.");
            } else {
                throw new Error("Verifikasi gagal: " + (error.message || "Password tidak cocok"));
            }
        }
    }

    async function promptSuperadminVerification(actionName = "melanjutkan aksi") {
        const { value: password } = await Swal.fire({
            title: '🔐 Verifikasi Wajib',
            html: `Anda akan ${actionName}.<br><strong>Setiap tampilkan daftar akun atau buat/edit Superadmin memerlukan verifikasi.</strong><br>
                   Masukkan password <strong style="color:#3b82f6">Superadmin</strong>:`,
            input: 'password',
            inputPlaceholder: 'Password superadmin',
            inputAttributes: { autocapitalize: 'off', autocorrect: 'off' },
            showCancelButton: true,
            confirmButtonText: 'Verifikasi',
            cancelButtonText: 'Batal',
            confirmButtonColor: '#3b82f6',
            cancelButtonColor: '#d33',
            backdrop: true,
            allowOutsideClick: false
        });

        if (!password) {
            throw new Error('Verifikasi dibatalkan oleh pengguna');
        }
        await verifySuperadminPassword(password);
        return true;
    }

    // === MUAT DAFTAR AKUN ===
    async function muatDaftarAkun() {
        tableAkunDiv.innerHTML = '<div style="padding:40px;text-align:center;"><i class="fas fa-spinner fa-pulse"></i> Mengambil data...</div>';
        try {
            const q = query(collection(db, "users"), orderBy("email", "asc"));
            const snapshot = await getDocs(q);
            if (snapshot.empty) {
                tableAkunDiv.innerHTML = '<div style="padding:40px;text-align:center;">📭 Belum ada akun terdaftar. Silakan tambah akun.</div>';
                return;
            }
            let html = `<table>
                <thead>
                    <tr><th>Nama Pengguna</th><th>Email</th><th>Level</th><th>Aksi</th></tr>
                </thead>
                <tbody>`;
            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                const uid = docSnap.id;
                let badge = '';
                if (data.level === 'superadmin') badge = '<span class="badge badge-superadmin"><i class="fas fa-crown"></i> Superadmin</span>';
                else if (data.level === 'admin') badge = '<span class="badge badge-admin"><i class="fas fa-user-shield"></i> Admin</span>';
                else badge = '<span class="badge badge-pengguna"><i class="fas fa-user-check"></i> Pengguna</span>';
                html += `<tr>
                    <td>${escapeHtml(data.namaPengguna || '-')}</td>
                    <td>${escapeHtml(data.email)}</td>
                    <td>${badge}</td>
                    <td>
                        <button class="btn btn-secondary btn-sm" onclick="window.editAkun('${uid}')"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="window.hapusAkun('${uid}', '${escapeHtml(data.email)}')"><i class="fas fa-trash-alt"></i> Hapus</button>
                    </td>
                </tr>`;
            }
            html += `</tbody></table>`;
            tableAkunDiv.innerHTML = html;
        } catch (err) {
            tableAkunDiv.innerHTML = `<div style="padding:40px;text-align:center;">⚠️ Error: ${err.message}</div>`;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    window.editAkun = async function(uid) {
        try {
            const docRef = doc(db, "users", uid);
            const snap = await getDoc(docRef);
            if (!snap.exists()) {
                tampilkanStatus("Data akun tidak ditemukan", true);
                return;
            }
            const data = snap.data();
            namaPenggunaInput.value = data.namaPengguna || "";
            emailInput.value = data.email || "";
            passwordInput.value = "";
            levelSelect.value = data.level || "pengguna";
            modeEdit = true;
            editUid = uid;
            formTitle.innerText = `✏️ Edit Akun: ${data.email}`;
            tampilkanStatus("Mode edit aktif. Password tidak dapat diubah dari sini (gunakan reset password jika perlu).", false);
            document.querySelector('.glass-card').scrollIntoView({ behavior: 'smooth' });
        } catch (err) {
            tampilkanStatus("Gagal memuat data edit", true);
        }
    };

    window.hapusAkun = async function(uid, email) {
        const konfirm = await Swal.fire({
            title: 'Hapus Akun?',
            text: `Akun ${email} akan dihapus secara permanen dari database.`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#3b82f6',
            confirmButtonText: 'Ya, Hapus',
            cancelButtonText: 'Batal'
        });
        if (!konfirm.isConfirmed) return;
        try {
            await deleteDoc(doc(db, "users", uid));
            sweetInfo("success", "Terhapus", `Akun ${email} dihapus dari Firestore.`);
            if (daftarVisible) await muatDaftarAkun();
            if (modeEdit && editUid === uid) resetForm();
        } catch (err) {
            tampilkanStatus("Gagal hapus: " + err.message, true);
        }
    };

    // === SIMPAN AKUN DENGAN VERIFIKASI JIKA LEVEL SUPERADMIN ===
    async function simpanAkun() {
        const namaPengguna = namaPenggunaInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        const level = levelSelect.value;

        if (!namaPengguna || !email || !level) {
            tampilkanStatus("Nama Pengguna, Email, dan Level harus diisi!", true);
            return;
        }
        if (!modeEdit && (!password || password.length < 6)) {
            tampilkanStatus("Password minimal 6 karakter untuk akun baru", true);
            return;
        }

        // KEAMANAN: jika level SUPERADMIN, wajib verifikasi password
        if (level === "superadmin") {
            try {
                await promptSuperadminVerification(modeEdit ? "mengubah akun menjadi SUPERADMIN" : "membuat akun SUPERADMIN");
            } catch (err) {
                let msg = err.message || "Verifikasi dibatalkan. Akun SUPERADMIN tidak disimpan.";
                if (msg.includes("dibatalkan")) {
                    Swal.fire({ icon: 'info', title: 'Dibatalkan', text: 'Penyimpanan akun SUPERADMIN dibatalkan.', confirmButtonColor: '#3b82f6' });
                } else {
                    Swal.fire({ icon: 'error', title: 'Akses Ditolak', text: msg, confirmButtonColor: '#d33' });
                }
                return;
            }
        }

        // Proses simpan
        try {
            if (modeEdit && editUid) {
                const userRef = doc(db, "users", editUid);
                const snap = await getDoc(userRef);
                if (!snap.exists()) throw new Error("Akun tidak ditemukan");
                await updateDoc(userRef, {
                    namaPengguna: namaPengguna,
                    level: level,
                    updatedAt: new Date().toISOString()
                });
                sweetInfo("success", "Berhasil", "Data akun diperbarui (level & nama pengguna)");
                resetForm();
                if (daftarVisible) await muatDaftarAkun();
                return;
            }

            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCred.user;
            await setDoc(doc(db, "users", user.uid), {
                uid: user.uid,
                email: email,
                namaPengguna: namaPengguna,
                level: level,
                createdAt: new Date().toISOString()
            });
            sweetInfo("success", "Sukses", `Akun ${email} berhasil dibuat`);
            resetForm();
            if (daftarVisible) await muatDaftarAkun();
        } catch (err) {
            console.error(err);
            let msg = err.message;
            if (err.code === 'auth/email-already-in-use') msg = "Email sudah terdaftar, gunakan email lain.";
            else if (err.code === 'auth/invalid-email') msg = "Format email tidak valid.";
            tampilkanStatus(`Gagal: ${msg}`, true);
        }
    }

    // === MENAMPILKAN DAFTAR AKUN: WAJIB VERIFIKASI (tanpa syarat level) ===
    async function toggleDaftar() {
        if (!daftarVisible) {
            // Setiap kali akan menampilkan daftar, minta verifikasi password 
            try {
                await promptSuperadminVerification("menampilkan seluruh daftar akun");
                // Verifikasi berhasil
                daftarContainer.style.display = "block";
                await muatDaftarAkun();
                daftarVisible = true;
                toggleDaftarBtn.innerHTML = '<i class="fas fa-eye-slash"></i> Sembunyikan Daftar Akun';
                tampilkanStatus("✅ Verifikasi berhasil. Menampilkan daftar akun.", false, true);
            } catch (err) {
                let msg = err.message || "Verifikasi dibatalkan.";
                if (msg.includes("dibatalkan")) {
                    Swal.fire({ icon: 'info', title: 'Dibatalkan', text: 'Tidak jadi menampilkan daftar akun.', confirmButtonColor: '#3b82f6' });
                } else {
                    Swal.fire({ icon: 'error', title: 'Akses Ditolak', text: msg, confirmButtonColor: '#d33' });
                }
                // daftarContainer tetap tersembunyi
                return;
            }
        } else {
            // Sembunyikan daftar
            daftarContainer.style.display = "none";
            daftarVisible = false;
            toggleDaftarBtn.innerHTML = '<i class="fas fa-list-ul"></i> Tampilkan Daftar Akun';
        }
    }

    // Event listeners
    simpanBtn.addEventListener("click", simpanAkun);
    resetBtn.addEventListener("click", resetForm);
    toggleDaftarBtn.addEventListener("click", toggleDaftar);
    refreshBtn.addEventListener("click", async () => { if (daftarVisible) await muatDaftarAkun(); });

    // Dark mode
    const themeBtn = document.getElementById("themeToggleBtn");
    function setTheme(theme) {
        if (theme === 'dark') document.body.classList.add("dark");
        else document.body.classList.remove("dark");
        localStorage.setItem("kdmp_theme", theme);
        themeBtn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }
    const savedTheme = localStorage.getItem("kdmp_theme");
    if (savedTheme === 'dark') setTheme('dark');
    else setTheme('light');
    themeBtn.addEventListener("click", () => {
        const newTheme = document.body.classList.contains("dark") ? "light" : "dark";
        setTheme(newTheme);
    });

    resetForm();
    console.log("✅ Keamanan aktif: Tampilkan Daftar Akun WAJIB verifikasi. Buat/Edit Superadmin juga wajib verifikasi.");
</script>
</body>
</html>
